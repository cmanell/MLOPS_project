name: CD

on:
  push:
    branches:
      - main
      - develop_Talib

jobs:
  deploy:
    name: Build, Push & Deploy to Azure
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to Azure Container Registry
        run: az acr login --name creditdefaultapp

      - name: Build and push image to ACR
        run: |
          docker build -t creditdefaultapp.azurecr.io/credit-default-app:${{ github.sha }} .
          docker build -t creditdefaultapp.azurecr.io/credit-default-app:latest .
          docker push creditdefaultapp.azurecr.io/credit-default-app:${{ github.sha }}
          docker push creditdefaultapp.azurecr.io/credit-default-app:latest

      - name: Deploy to Azure Container Apps
        run: |
          az containerapp update \
            --name credit-default-app \
            --resource-group rgsda2026 \
            --image creditdefaultapp.azurecr.io/credit-default-app:${{ github.sha }}
